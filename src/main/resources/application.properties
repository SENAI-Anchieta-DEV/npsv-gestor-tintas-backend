spring.application.name=npsv-gestor-tintas-backend

# ===============================
# ConfigurašŃo do Admin Provisˇrio
# ===============================
sistema.admin.email=admin@gestortintas.com
sistema.admin.senha=admin123


# ===============================
# ConfigurašŃo do Banco (H2) TESTE
# ===============================
spring.datasource.url=jdbc:h2:mem:npsv_gestor_tintas_backend
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


