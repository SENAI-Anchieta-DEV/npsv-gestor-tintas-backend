spring.application.name=npsv-gestor-tintas-backend

# ===============================
# = SELECAO BANCO DE DADOS DE DEV =
# ===============================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===============================
# = BOOTSTRAP ADMIN PROVISORIO =
# ===============================
sistema.admin.email=${SISTEMA_ADMIN_EMAIL}
sistema.admin.senha=${SISTEMA_ADMIN_SENHA}

# ===============================
# = CONFIGURACAO JWT =
# ===============================
security.jwt.secret=${SECURITY_JWT_SECRET:mysupersecretkeymysupersecretkey123!}
security.jwt.access-expiration=${SECURITY_JWT_ACCESS_EXPIRATION:900}
security.jwt.refresh-expiration=${SECURITY_JWT_REFRESH_EXPIRATION:604800}

# ===============================
# = CORS =
# ===============================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===============================
# = FLYWAY E JPA =
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate

server.address=0.0.0.0
server.port=${PORT:8080}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

server.forward-headers-strategy=framework
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Configuracao do broker (exemplo local)
mqtt.broker-url=tcp://localhost:1883
mqtt.client-id=app-local
mqtt.username=
mqtt.password=

# Configuracoes adicionais
mqtt.clean-session=true
mqtt.automatic-reconnect=true
mqtt.keep-alive-interval=60
mqtt.connection-timeout=30
mqtt.default-qos=1

