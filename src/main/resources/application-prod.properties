spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
app.storage.public-base-url=${APP_PUBLIC_BASE_URL}

app.storage.provider=${APP_STORAGE_PROVIDER:${STORAGE_TYPE:firebase}}
app.storage.local.base-path=${APP_STORAGE_LOCAL_BASE_PATH:uploads}
app.storage.local.public-path=${APP_STORAGE_LOCAL_PUBLIC_PATH:/uploads}
app.storage.firebase.bucket=${APP_STORAGE_FIREBASE_BUCKET:}
app.storage.firebase.project-id=${APP_STORAGE_FIREBASE_PROJECT_ID:}
app.storage.firebase.credentials-file=${APP_STORAGE_FIREBASE_CREDENTIALS_FILE:}
app.storage.firebase.credentials-base64=${APP_STORAGE_FIREBASE_CREDENTIALS_BASE64:}
app.storage.firebase.credentials-json=${APP_STORAGE_FIREBASE_CREDENTIALS_JSON:}
app.storage.firebase.folder=${APP_STORAGE_FIREBASE_FOLDER:uploads}