databases:
  - name: gestor-tintas-db
    databaseName: gestor_tintas
    user: gestor_admin
    plan: free

services:
  - type: web
    name: gestor-tintas-backend-api
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health/readiness
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_HOST
        fromDatabase:
          name: gestor-tintas-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: gestor-tintas-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: gestor-tintas-db
          property: database
      - key: DATABASE_USER
        fromDatabase:
          name: gestor-tintas-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: gestor-tintas-db
          property: password
      - key: SECURITY_JWT_SECRET
        generateValue: true
      - key: SISTEMA_ADMIN_EMAIL
        sync: false
      - key: SISTEMA_ADMIN_SENHA
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false