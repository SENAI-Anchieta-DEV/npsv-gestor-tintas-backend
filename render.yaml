services:
  - type: web
    name: gestor-tintas-backend-api
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health/readiness
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_PORT
        sync: false
      - key: DATABASE_NAME
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: SECURITY_JWT_SECRET
        generateValue: true
      - key: SISTEMA_ADMIN_EMAIL
        sync: false
      - key: SISTEMA_ADMIN_SENHA
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false